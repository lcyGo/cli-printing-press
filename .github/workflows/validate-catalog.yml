name: Validate Catalog

on:
  pull_request:
    paths:
      - 'catalog/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate catalog PR body
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail

          # Determine whether this PR adds/edits a generatable catalog entry
          # (one with spec_url/spec_format, or a spec file under catalog/specs/).
          # The CLI Shape section is required for those and optional ("N/A")
          # for wrapper-only entries. fetch-depth: 0 on checkout gives full
          # history, but fetch the base ref explicitly to guard partial-clone
          # edge cases on fork PRs (mirrors the changed-entry step below).
          git fetch --no-tags --prune origin "$BASE_REF" || true

          GENERATABLE=false
          mapfile -t CHANGED < <(git diff --name-only --diff-filter=ACMR "origin/${BASE_REF}...HEAD" -- 'catalog/**')
          for file in "${CHANGED[@]}"; do
            case "$file" in
              catalog/specs/*)
                GENERATABLE=true
                ;;
              catalog/*.yaml)
                if [ -f "$file" ] && grep -Eq '^(spec_url|spec_format):' "$file"; then
                  GENERATABLE=true
                fi
                ;;
            esac
          done
          export GENERATABLE
          echo "Generatable catalog entry: $GENERATABLE"

          python3 - <<'PY'
          import os
          import re
          import sys

          body = os.environ.get("PR_BODY") or ""
          generatable = os.environ.get("GENERATABLE") == "true"
          required = [
              "Embedded catalog fit",
              "Distinct blueprint pattern",
              "Closest existing entries checked",
              "Source provenance",
              "Auth and tenant assumptions",
              "Safe default surface",
              "Generation path",
              "Stale-body check",
          ]
          next_field = "|".join(rf"^{re.escape(label)}:\s*" for label in required)

          def section_body(title):
              match = re.search(
                  rf"(?ims)^## {re.escape(title)}\s*$(.*?)(?=^##\s+|\Z)",
                  body,
              )
              return match.group(1) if match else None

          catalog_section = section_body("Catalog Justification") or ""

          def field_has_content(label):
              match = re.search(
                  rf"(?ims)^{re.escape(label)}:\s*(.*?)(?={next_field}|^##\s+|\Z)",
                  catalog_section,
              )
              if not match:
                  return False
              content = match.group(1).strip()
              return bool(content and content.upper() != "N/A")

          missing = []
          if section_body("Catalog Justification") is None:
              missing.append("## Catalog Justification")
          for label in required:
              if not field_has_content(label):
                  missing.append(label)

          # CLI Shape: section must be present for every catalog PR. For a
          # generatable entry it must also carry the real command surface
          # (not empty, not "N/A"); wrapper-only entries may leave "N/A".
          cli_shape = section_body("CLI Shape")
          if cli_shape is None:
              missing.append("## CLI Shape")
          elif generatable:
              content = re.sub(r"(?s)<!--.*?-->", "", cli_shape).strip()
              if not content or content.upper() == "N/A":
                  missing.append("## CLI Shape (generated command surface required for generatable entries)")

          if missing:
              print("FAIL: catalog PRs must complete the Catalog Justification and CLI Shape sections.")
              print("Missing or empty fields:")
              for item in missing:
                  print(f"  - {item}")
              sys.exit(1)

          print("PASS: Catalog Justification and CLI Shape sections are present and complete.")
          PY

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Build printing-press
        run: go build -o ./printing-press ./cmd/printing-press

      - name: Validate catalog schemas
        run: go test ./internal/catalog/... -v

      - name: Validate changed catalog entries
        run: |
          set -euo pipefail

          # Ensure the base ref is fetched locally so the diff below resolves.
          # actions/checkout with fetch-depth: 0 should cover this, but fetch
          # explicitly to guard against partial-clone edge cases on fork PRs.
          git fetch --no-tags --prune origin "${{ github.base_ref }}"

          mapfile -t CHANGED < <(git diff --name-only --diff-filter=ACMR "origin/${{ github.base_ref }}...HEAD" -- 'catalog/*.yaml')

          if [ "${#CHANGED[@]}" -eq 0 ]; then
            echo "FAIL: workflow triggered on catalog/** changes but git diff found no changed catalog/*.yaml files."
            echo "This usually means the base ref was not fetched. Check actions/checkout fetch-depth."
            exit 1
          fi

          echo "Found ${#CHANGED[@]} changed catalog file(s):"
          printf '  - %s\n' "${CHANGED[@]}"

          for file in "${CHANGED[@]}"; do
            echo "=== Validating $file ==="

            # Wrapper-only entries (no spec_url) have nothing to fetch or generate.
            # The schema test above already validated them against catalog rules.
            if ! grep -q '^spec_url:' "$file"; then
              echo "SKIP: wrapper-only entry (no spec_url)"
              continue
            fi

            # Extract spec_url
            SPEC_URL=$(grep '^spec_url:' "$file" | sed 's/spec_url: *//')

            # Verify HTTPS
            if [[ ! "$SPEC_URL" =~ ^https:// ]]; then
              echo "FAIL: spec_url must use HTTPS: $SPEC_URL"
              exit 1
            fi

            SPEC_FILE="$(mktemp "${RUNNER_TEMP:-/tmp}/spec-validate.XXXXXX.yaml")"
            RAW_PREFIX="https://raw.githubusercontent.com/mvanhorn/cli-printing-press/main/"
            if [[ "$SPEC_URL" == "$RAW_PREFIX"* ]]; then
              LOCAL_SPEC="${SPEC_URL#"$RAW_PREFIX"}"
              if [[ ! -f "$LOCAL_SPEC" ]]; then
                echo "FAIL: in-repo spec_url points at missing file: $LOCAL_SPEC"
                exit 1
              fi
              cp "$LOCAL_SPEC" "$SPEC_FILE"
              echo "PASS: using local PR copy for in-repo spec ($LOCAL_SPEC)"
            else
              # Verify external URLs are accessible.
              HTTP_STATUS=$(curl -sL -o /dev/null -w '%{http_code}' "$SPEC_URL")
              if [[ "$HTTP_STATUS" != "200" ]]; then
                echo "FAIL: spec_url returned HTTP $HTTP_STATUS: $SPEC_URL"
                exit 1
              fi

              echo "PASS: URL accessible ($HTTP_STATUS)"
              curl -sL -o "$SPEC_FILE" "$SPEC_URL"
            fi

            # Generate from the resolved spec.
            NAME=$(grep '^name:' "$file" | head -1 | sed 's/name: *//')
            OUT_DIR="${RUNNER_TEMP:-/tmp}/${NAME}-cli"

            # Forward auth_preference when the entry sets one so the generated
            # CLI matches what `printing-press generate <name>` would produce.
            # Use yq so quoted values, trailing comments, and indentation are
            # handled correctly (grep+sed silently mangled those).
            AUTH_PREFERENCE_ARG=()
            AUTH_PREF=$(yq e '.auth_preference // ""' "$file")
            if [ -n "$AUTH_PREF" ]; then
              AUTH_PREFERENCE_ARG=(--auth-preference "$AUTH_PREF")
            fi

            ./printing-press generate \
              --spec "$SPEC_FILE" \
              --spec-url "$SPEC_URL" \
              --name "$NAME" \
              --output "$OUT_DIR" \
              --validate \
              "${AUTH_PREFERENCE_ARG[@]}"

            echo "PASS: Generated CLI compiles"
            rm -rf "$OUT_DIR" "$SPEC_FILE"
          done
